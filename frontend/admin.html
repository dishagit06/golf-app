<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <h2>⚙️ Admin Panel</h2>

    <button onclick="loadAdminUsers()">Load Users</button>

    <ul id="adminUsers"></ul>

</div>

<script src="script.js"></script>

<script>
    const role = localStorage.getItem("role");

    if (role !== "admin") {
        alert("Access denied ❌");
        window.location.href = "index.html";
    }
</script>

</body>
</html>
